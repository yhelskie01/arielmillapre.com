<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Tech Landing Page</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="icon.png" type="image/png">

  <style>
   
        #liveClock {
            font-size: 18px;
            font-weight: bold;
            color: #333;
        }
    
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', sans-serif;
    }

    body {
      height: 100vh;
      overflow: hidden;
      background: #0f2027;
      color: white;
    }

    /* Animated gradient background */
    body::before {
      content: "";
      position: absolute;
      width: 200%;
      height: 200%;
      background: linear-gradient(45deg, #00c6ff, #0072ff, #00ffcc, #6a11cb);
      animation: bgMove 10s linear infinite;
      z-index: -2;
    }

    @keyframes bgMove {
      0% { transform: translate(-25%, -25%) rotate(0deg); }
      100% { transform: translate(-25%, -25%) rotate(360deg); }
    }

    /* Floating particles */
    .particles span {
      position: absolute;
      display: block;
      width: 5px;
      height: 5px;
      background: white;
      animation: float 10s linear infinite;
      opacity: 0.6;
    }

    @keyframes float {
      0% {
        transform: translateY(100vh) scale(0);
      }
      100% {
        transform: translateY(-10vh) scale(1);
      }
    }

    /* Center content */
    .container {
      position: relative;
      height: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      text-align: center;
    }

    h1 {
      font-size: 3rem;
      margin-bottom: 20px;
      letter-spacing: 2px;
      animation: fadeIn 2s ease forwards;
    }

    p {
      margin-bottom: 30px;
      opacity: 0.8;
      animation: fadeIn 3s ease forwards;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Button */
    button {
      padding: 15px 30px;
      font-size: 1rem;
      border: none;
      border-radius: 30px;
      background: linear-gradient(45deg, #00c6ff, #0072ff);
      color: white;
      cursor: pointer;
      transition: 0.3s;
      box-shadow: 0 0 15px rgba(0, 198, 255, 0.7);
    }

    button:hover {
      transform: scale(1.1);
      box-shadow: 0 0 25px rgba(0, 198, 255, 1);
    }

  </style>
</head>
<body>

  <!-- Particle Background -->
  <div class="particles">
    <span style="left:10%; animation-delay:0s;"></span>
    <span style="left:20%; animation-delay:2s;"></span>
    <span style="left:30%; animation-delay:4s;"></span>
    <span style="left:40%; animation-delay:1s;"></span>
    <span style="left:50%; animation-delay:3s;"></span>
    <span style="left:60%; animation-delay:5s;"></span>
    <span style="left:70%; animation-delay:2s;"></span>
    <span style="left:80%; animation-delay:4s;"></span>
    <span style="left:90%; animation-delay:1s;"></span>
  </div>

  <!-- Main Content -->
  <div class="container">
    <h1>Welcome to My Page</h1>
    <p>Experience the future with stunning animations</p>
    
    <button onclick="goToPage()">Get Started</button>
  </div>
  <p>Current Date & Time: <span id="liveClock"></span></p>

    <script>
        function updateClock() {
            const now = new Date();

            // Format date and time
            const options = { 
                weekday: 'long', 
                year: 'numeric', 
                month: 'long', 
                day: 'numeric', 
                hour: '2-digit', 
                minute: '2-digit', 
                second: '2-digit' 
            };
            const formatted = now.toLocaleString('en-US', options);

            // Display in the HTML
            document.getElementById('liveClock').textContent = formatted;
        }

        // Update every second
        setInterval(updateClock, 1000);
        updateClock(); // Initial call
    </script>

  <script>
    
    function goToPage() {
      window.location.href = "home"; 
    }
  </script>

</body>
</html>
